<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnosis Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center text-success">Diagnosis Result</h2>
        <div class="card shadow p-4">
            <h5><strong>Diagnosis:</strong> <span class="text-danger">{{ diagnosis }}</span></h5>
            <h5><strong>Model Accuracy:</strong> {{ accuracy }}</h5>
            <hr>
            <h5>Uploaded File:</h5>
            <img src="{{ "."+file_path }}" class="img-fluid rounded shadow" style="max-width: 300px;" alt="Uploaded Scan">
            <hr>
            <h5>Extracted Features:</h5>
            <table class="table table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Feature #</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in range(features|length) %}
                        <tr>
                            <td>{{ i+1 }}</td>
                            <td>{{ features[i] }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
            <a href="/" class="btn btn-primary mt-3">Upload Another Scan</a>
        </div>
    </div>
</body>
</html>
